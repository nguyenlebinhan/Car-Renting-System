<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="adminNavbar(activePage)">
      <div class="container">
        <a class="navbar-brand" th:href="@{/v1/admin/dashboard}">FU Car Renting · Admin</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#adminNavbar"
          aria-controls="adminNavbar"
          aria-expanded="false"
          aria-label="Mở menu"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="adminNavbar">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a
                class="nav-link"
                th:classappend="${activePage == 'dashboard'} ? 'active'"
                th:href="@{/v1/admin/dashboard}"
              >
                Trang chủ
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link" th:classappend="${activePage == 'car'} ? 'active'" th:href="@{/v1/admin/car/list}">
                Xe
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link"
                th:classappend="${activePage == 'producer'} ? 'active'"
                th:href="@{/v1/admin/producer/list}"
              >
                Hãng xe
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link"
                th:classappend="${activePage == 'rental'} ? 'active'"
                th:href="@{/v1/admin/rental/list}"
              >
                Thuê xe
              </a>
            </li>
            <li class="nav-item">
              <a
                class="nav-link"
                th:classappend="${activePage == 'report'} ? 'active'"
                th:href="@{/v1/admin/car-rental/report}"
              >
                Báo cáo
              </a>
            </li>
          </ul>
          <div class="d-lg-flex align-items-center gap-2">
            <span class="navbar-text me-2">Quản trị viên</span>
            <form class="d-inline" method="post" th:action="@{/v1/auth/logout}">
              <button class="btn btn-outline-light btn-sm" type="submit">Đăng xuất</button>
            </form>
          </div>
        </div>
      </div>
    </nav>
  </body>
</html>
