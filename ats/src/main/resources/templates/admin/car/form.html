<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${editMode} ? 'Cập nhật xe' : 'Thêm xe mới'">Thông tin xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <th:block th:replace="~{components/admin-navbar :: adminNavbar(activePage='car')}"></th:block>

    <main class="container py-4" style="max-width: 960px">
      <div class="mb-3">
        <a th:href="@{/v1/admin/car/list}">← Danh sách xe</a>
        <h1 class="h3 mt-2 mb-0" th:text="${editMode} ? 'Cập nhật xe' : 'Thêm xe mới'">Thông tin xe</h1>
      </div>

      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <form
        class="card shadow-sm"
        method="post"
        th:object="${carCreationRequest}"
        th:action="${editMode} ? @{/v1/admin/car/edit(id=*{carId})} : @{/v1/admin/car/create}"
      >
        <input type="hidden" th:field="*{carId}" />
        <div class="card-body">
          <div class="row g-3">
            <div class="col-md-8">
              <label class="form-label" for="carName">Tên xe</label>
              <input
                id="carName"
                class="form-control"
                type="text"
                th:field="*{carName}"
                th:classappend="${#fields.hasErrors('carName')} ? 'is-invalid' : ''"
                required
              />
              <div class="invalid-feedback" th:errors="*{carName}">Tên xe không hợp lệ.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="carModelYear">Năm sản xuất</label>
              <input
                id="carModelYear"
                class="form-control"
                type="number"
                th:field="*{carModelYear}"
                th:classappend="${#fields.hasErrors('carModelYear')} ? 'is-invalid' : ''"
                required
              />
              <div class="invalid-feedback" th:errors="*{carModelYear}">Năm sản xuất không hợp lệ.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="color">Màu sắc</label>
              <input
                id="color"
                class="form-control"
                type="text"
                th:field="*{color}"
                th:classappend="${#fields.hasErrors('color')} ? 'is-invalid' : ''"
                required
              />
              <div class="invalid-feedback" th:errors="*{color}">Màu xe không hợp lệ.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="capacity">Số chỗ</label>
              <input
                id="capacity"
                class="form-control"
                type="number"
                th:field="*{capacity}"
                th:classappend="${#fields.hasErrors('capacity')} ? 'is-invalid' : ''"
                required
              />
              <div class="invalid-feedback" th:errors="*{capacity}">Số chỗ không hợp lệ.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="importDate">Ngày nhập</label>
              <input
                id="importDate"
                class="form-control"
                type="date"
                th:field="*{importDate}"
                th:classappend="${#fields.hasErrors('importDate')} ? 'is-invalid' : ''"
                required
              />
              <div class="invalid-feedback" th:errors="*{importDate}">Ngày nhập không hợp lệ.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="rentPrice">Giá thuê/ngày</label>
              <input
                id="rentPrice"
                class="form-control"
                type="number"
                th:field="*{rentPrice}"
                th:classappend="${#fields.hasErrors('rentPrice')} ? 'is-invalid' : ''"
                required
              />
              <div class="invalid-feedback" th:errors="*{rentPrice}">Giá thuê không hợp lệ.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="status">Trạng thái</label>
              <select
                id="status"
                class="form-select"
                th:field="*{status}"
                th:classappend="${#fields.hasErrors('status')} ? 'is-invalid' : ''"
              >
                <option th:each="s : ${carStatuses}" th:value="${s}" th:text="${s}"></option>
              </select>
              <div class="invalid-feedback" th:errors="*{status}">Trạng thái không hợp lệ.</div>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="producerId">Hãng xe</label>
              <select
                id="producerId"
                class="form-select"
                th:field="*{producerId}"
                th:classappend="${#fields.hasErrors('producerId')} ? 'is-invalid' : ''"
                required
              >
                <option value="">-- Chọn hãng xe --</option>
                <option
                  th:each="producer : ${producers}"
                  th:value="${producer.producerId}"
                  th:text="${producer.producerName + ' (' + producer.country + ')'}"
                ></option>
              </select>
              <div class="invalid-feedback" th:errors="*{producerId}">Vui lòng chọn hãng xe.</div>
            </div>
            <div class="col-12">
              <label class="form-label" for="description">Mô tả</label>
              <textarea
                id="description"
                class="form-control"
                rows="4"
                th:field="*{description}"
                th:classappend="${#fields.hasErrors('description')} ? 'is-invalid' : ''"
                required
              ></textarea>
              <div class="invalid-feedback" th:errors="*{description}">Mô tả không hợp lệ.</div>
            </div>
          </div>
        </div>
        <div class="card-footer bg-white text-end">
          <a class="btn btn-outline-secondary" th:href="@{/v1/admin/car/list}">Hủy</a>
          <button class="btn btn-primary" type="submit">Lưu</button>
        </div>
      </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
