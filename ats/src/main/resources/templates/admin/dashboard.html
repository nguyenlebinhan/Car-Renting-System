<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản trị FU Car Renting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <th:block th:replace="~{components/admin-navbar :: adminNavbar(activePage='dashboard')}"></th:block>
    <main class="container py-4">
      <h1 class="h3 mb-4">Bảng điều khiển</h1>
      <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
      <div class="row g-3 mb-4" th:object="${dashboardDTO}">
        <div class="col-md-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="text-muted">Khách hàng</div>
              <div class="display-6" th:text="*{numberOfCustomer}">0</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="text-muted">Xe</div>
              <div class="display-6" th:text="*{totalCars}">0</div>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card shadow-sm">
            <div class="card-body">
              <div class="text-muted">Giao dịch thuê</div>
              <div class="display-6" th:text="*{totalCarRentals}">0</div>
            </div>
          </div>
        </div>
      </div>
      <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center gap-3">
          <h2 class="h5 mb-0">Danh sách khách hàng</h2>
          <a class="btn btn-primary" th:href="@{/v1/admin/customer/create}">Thêm khách hàng</a>
        </div>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Họ tên</th>
                <th>Tài khoản</th>
                <th>Liên hệ</th>
                <th>Ngày sinh</th>
                <th>CCCD</th>
                <th>GPLX</th>
                <th>Ngày cấp</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="customer : ${profileResponse.content}">
                <td th:text="${customer.customerId}">1</td>
                <td th:text="${customer.customerName}">Khách hàng</td>
                <td>
                  <span th:text="${customer.accountName}">Tài khoản</span>
                  <br />
                  <small th:text="${customer.email}">email@example.com</small>
                </td>
                <td th:text="${customer.mobile}">Số điện thoại</td>
                <td th:text="${#temporals.format(customer.birthday,'dd/MM/yyyy')}">01/01/2000</td>
                <td th:text="${customer.identityCard}">CCCD</td>
                <td th:text="${customer.licenceNumber}">GPLX</td>
                <td th:text="${#temporals.format(customer.licenceDate,'dd/MM/yyyy')}">01/01/2020</td>
                <td class="text-nowrap">
                  <a
                    class="btn btn-sm btn-outline-primary"
                    th:href="@{/v1/admin/customer/edit(id=${customer.customerId})}"
                  >
                    Sửa
                  </a>
                  <form
                    class="d-inline"
                    method="post"
                    th:action="@{/v1/admin/customer/delete(id=${customer.customerId})}"
                    onsubmit="return confirm('Xóa khách hàng này?');"
                  >
                    <button class="btn btn-sm btn-outline-danger" type="submit">Xóa</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(profileResponse.content)}">
                <td colspan="9" class="text-center py-4">Chưa có khách hàng.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <nav class="mt-3" th:if="${profileResponse.totalPages > 1}" aria-label="Phân trang khách hàng">
        <ul class="pagination">
          <li
            class="page-item"
            th:each="pageIndex : ${#numbers.sequence(0,profileResponse.totalPages-1)}"
            th:classappend="${pageIndex == profileResponse.pageNumber} ? 'active'"
          >
            <a
              class="page-link"
              th:href="@{/v1/admin/dashboard(pageNumber=${pageIndex},pageSize=${profileResponse.pageSize})}"
              th:text="${pageIndex+1}"
            ></a>
          </li>
        </ul>
      </nav>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
