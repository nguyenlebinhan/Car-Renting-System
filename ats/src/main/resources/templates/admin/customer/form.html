<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thông tin khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <th:block th:replace="~{components/admin-navbar :: adminNavbar(activePage='customer')}"></th:block>
    <main class="container py-4">
      <a th:href="@{/v1/admin/dashboard}">← Danh sách khách hàng</a>
      <h1 class="h3 my-3" th:text="${editMode}?'Cập nhật khách hàng':'Thêm khách hàng'"></h1>
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
      <form
        class="card shadow-sm p-4"
        method="post"
        th:object="${customerRequest}"
        th:action="${editMode}? @{/v1/admin/customer/edit(id=*{customerId})}:@{/v1/admin/customer/create}"
      >
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Tên tài khoản</label>
            <input class="form-control" th:field="*{accountName}" />
            <div class="text-danger small" th:errors="*{accountName}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" th:field="*{email}" />
            <div class="text-danger small" th:errors="*{email}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label" th:text="${editMode}?'Mật khẩu mới (để trống nếu giữ nguyên)':'Mật khẩu'"></label>
            <input
              type="password"
              class="form-control"
              th:field="*{password}"
              th:required="${!editMode}"
              th:attr="minlength=${editMode ? null : 6}"
              maxlength="100"
              autocomplete="new-password"
            />
            <div class="text-danger small" th:errors="*{password}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Họ và tên</label>
            <input class="form-control" th:field="*{customerName}" />
            <div class="text-danger small" th:errors="*{customerName}"></div>
          </div>
          <div class="col-md-4">
            <label class="form-label">Điện thoại</label>
            <input class="form-control" th:field="*{mobile}" />
            <div class="text-danger small" th:errors="*{mobile}"></div>
          </div>
          <div class="col-md-4">
            <label class="form-label">Ngày sinh</label>
            <input type="date" class="form-control" th:field="*{birthday}" />
            <div class="text-danger small" th:errors="*{birthday}"></div>
          </div>
          <div class="col-md-4">
            <label class="form-label">CCCD/CMND</label>
            <input class="form-control" th:field="*{identityCard}" />
            <div class="text-danger small" th:errors="*{identityCard}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Số giấy phép lái xe</label>
            <input class="form-control" th:field="*{licenceNumber}" />
            <div class="text-danger small" th:errors="*{licenceNumber}"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Ngày cấp giấy phép</label>
            <input type="date" class="form-control" th:field="*{licenceDate}" />
            <div class="text-danger small" th:errors="*{licenceDate}"></div>
          </div>
        </div>
        <div class="mt-4">
          <button class="btn btn-primary">Lưu</button>
          <a class="btn btn-light" th:href="@{/v1/admin/dashboard}">Hủy</a>
        </div>
      </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
