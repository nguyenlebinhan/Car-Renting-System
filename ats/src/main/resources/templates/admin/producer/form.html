<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${editMode} ? 'Cập nhật hãng xe' : 'Thêm hãng xe'">Thông tin hãng xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <th:block th:replace="~{components/admin-navbar :: adminNavbar(activePage='producer')}"></th:block>
    <main class="container py-4" style="max-width: 760px">
      <div class="mb-3">
        <a th:href="@{/v1/admin/producer/list}">← Danh sách hãng xe</a>
        <h1 class="h3 mt-2 mb-0" th:text="${editMode} ? 'Cập nhật hãng xe' : 'Thêm hãng xe'">
          Thông tin hãng xe
        </h1>
      </div>

      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <form
        class="card shadow-sm"
        method="post"
        th:object="${producerRequest}"
        th:action="${editMode} ? @{/v1/admin/producer/edit(id=*{producerId})} : @{/v1/admin/producer/create}"
      >
        <input type="hidden" th:field="*{producerId}" />
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label" for="producerName">Tên hãng xe</label>
            <input
              id="producerName"
              class="form-control"
              type="text"
              th:field="*{producerName}"
              th:classappend="${#fields.hasErrors('producerName')} ? 'is-invalid' : ''"
              maxlength="100"
              required
            />
            <div class="invalid-feedback" th:errors="*{producerName}">Tên hãng xe không hợp lệ.</div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="address">Địa chỉ</label>
            <input
              id="address"
              class="form-control"
              type="text"
              th:field="*{address}"
              th:classappend="${#fields.hasErrors('address')} ? 'is-invalid' : ''"
              maxlength="200"
              required
            />
            <div class="invalid-feedback" th:errors="*{address}">Địa chỉ không hợp lệ.</div>
          </div>
          <div>
            <label class="form-label" for="country">Quốc gia</label>
            <input
              id="country"
              class="form-control"
              type="text"
              th:field="*{country}"
              th:classappend="${#fields.hasErrors('country')} ? 'is-invalid' : ''"
              maxlength="100"
              required
            />
            <div class="invalid-feedback" th:errors="*{country}">Quốc gia không hợp lệ.</div>
          </div>
        </div>
        <div class="card-footer bg-white text-end">
          <a class="btn btn-outline-secondary" th:href="@{/v1/admin/producer/list}">Hủy</a>
          <button class="btn btn-primary" type="submit">Lưu</button>
        </div>
      </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
