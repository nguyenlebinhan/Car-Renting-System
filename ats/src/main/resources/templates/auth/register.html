<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đăng ký khách hàng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <main class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
              <h1 class="h3">Đăng ký tài khoản khách hàng</h1>
              <p class="text-muted">Điền đầy đủ hồ sơ bắt buộc để có thể thuê xe trực tuyến.</p>
              <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
              <form method="post" th:action="@{/v1/auth/register}" th:object="${registerRequest}">
                <div class="row g-3">
                  <div class="col-md-6">
                    <label class="form-label">Tên tài khoản</label>
                    <input class="form-control" th:field="*{accountName}" />
                    <div class="text-danger small" th:errors="*{accountName}"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" th:field="*{email}" />
                    <div class="text-danger small" th:errors="*{email}"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Mật khẩu</label>
                    <input type="password" class="form-control" th:field="*{password}" />
                    <div class="text-danger small" th:errors="*{password}"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Họ và tên</label>
                    <input class="form-control" th:field="*{fullName}" />
                    <div class="text-danger small" th:errors="*{fullName}"></div>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Điện thoại</label>
                    <input class="form-control" th:field="*{mobile}" />
                    <div class="text-danger small" th:errors="*{mobile}"></div>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">Ngày sinh</label>
                    <input type="date" class="form-control" th:field="*{birthday}" />
                    <div class="text-danger small" th:errors="*{birthday}"></div>
                  </div>
                  <div class="col-md-4">
                    <label class="form-label">CCCD/CMND</label>
                    <input class="form-control" th:field="*{identityCard}" />
                    <div class="text-danger small" th:errors="*{identityCard}"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Số giấy phép lái xe</label>
                    <input class="form-control" th:field="*{licenceNumber}" />
                    <div class="text-danger small" th:errors="*{licenceNumber}"></div>
                  </div>
                  <div class="col-md-6">
                    <label class="form-label">Ngày cấp giấy phép</label>
                    <input type="date" class="form-control" th:field="*{licenceDate}" />
                    <div class="text-danger small" th:errors="*{licenceDate}"></div>
                  </div>
                </div>
                <button class="btn btn-primary w-100 mt-4">Đăng ký</button>
              </form>
              <div class="text-center mt-3">
                <a th:href="@{/v1/auth/login}">Đã có tài khoản? Đăng nhập</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
