<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FU Car Renting - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <style>
      body {
        background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        min-height: 100vh;
      }
      .login-card {
        border: none;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .brand-icon {
        font-size: 3rem;
        color: #0d6efd;
      }
    </style>
  </head>
  <body class="justify-content-center align-items-center d-flex">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="card login-card p-4 p-sm-5 bg-white">
            <div class="text-center mb-4">
              <div class="brand-icon mb-2">
                <i class="bi bi-car-front"></i>
              </div>
              <h3 class="fw-bold text-dark">FU Car Renting System</h3>
              <p class="text-muted small">Please sign in to access your dashboard</p>
            </div>

            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show small py-2" role="alert">
              <span th:text="${error}"></span>
              <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div
              th:if="${param.logout}"
              class="alert alert-success alert-dismissible fade show small py-2"
              role="alert"
            >
              <span>Bạn đã đăng xuất</span>
              <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${success}" class="alert alert-success alert-dismissible fade show small py-2" role="alert">
              <span th:text="${success}"></span>
              <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <form th:action="@{/v1/auth/login}" th:object="${loginRequest}" method="POST">
              <div class="mb-3">
                <label for="accountName" class="form-label small fw-bold text-secondary">Tên tài khoản</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted">
                    <i class="bi bi-person"></i>
                  </span>
                  <input
                    th:value="*{accountName}"
                    type="text"
                    class="form-control bg-light"
                    id="accountName"
                    name="accountName"
                    placeholder="Nhập tên tài khoản"
                    required
                    autofocus
                  />
                </div>
              </div>

              <div class="mb-3">
                <label for="password" class="form-label small fw-bold text-secondary">Password</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-end-0 text-muted">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input
                    th:value="*{password}"
                    type="password"
                    class="form-control bg-light border-start-0 ps-0"
                    id="password"
                    name="password"
                    placeholder="••••••••"
                    required
                  />
                </div>
              </div>
              <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary btn-lg fw-bold fs-6 shadow-sm">
                  Sign In
                  <i class="bi bi-arrow-right-short ms-1"></i>
                </button>
              </div>
            </form>
            <div class="d-flex justify-content-center border border-primary rounded mt-3 small">
              <span class="text-muted me-1">Chưa có tài khoản</span>
              <a th:href="@{/v1/auth/register}" class="text-decoration-none">Đăng kí tài khoản</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
