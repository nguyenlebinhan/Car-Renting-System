<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Không Tìm Thấy Trang</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
  </head>
  <body class="bg-light d-flex align-items-center justify-content-center" style="min-height: 100vh">
    <div class="text-center p-5 bg-white rounded-3 shadow-sm" style="max-width: 500px">
      <div class="text-danger display-1 mb-3">
        <i class="bi bi-exclamation-triangle-fill"></i>
      </div>
      <h1 class="fw-bold text-dark">404</h1>
      <h4 class="text-secondary mb-3">Không Tìm Thấy Tài Nguyên</h4>

      <p class="text-muted small border rounded p-3 bg-light text-start" th:text="${message}">
        Thông tin lỗi chi tiết sẽ xuất hiện ở đây...
      </p>

      <div class="d-grid gap-2 mt-4">
        <a th:href="@{/}" class="btn btn-primary fw-bold">
          <i class="bi bi-house-door-fill me-1"></i>
          Quay về Trang Chủ
        </a>
      </div>
    </div>
  </body>
</html>
