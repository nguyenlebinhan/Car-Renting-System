<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${editMode ? 'Cập nhật đánh giá' : 'Thêm đánh giá'} + ' | FU Car Renting'">Đánh giá</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light" th:with="displayName=${account.accountName}">
    <th:block th:replace="~{components/customer-navbar :: customerNavbar(activePage='reviews', displayName=${displayName})}"></th:block>
    <main class="container py-4" style="max-width: 760px">
      <div class="mb-3">
        <a class="text-decoration-none" th:href="@{/v1/customer/reviews}">← Quay lại danh sách</a>
        <h1 class="h3 mt-2" th:text="${editMode ? 'Cập nhật đánh giá' : 'Thêm đánh giá mới'}">Đánh giá</h1>
      </div>

      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
      <form class="card shadow-sm" method="post" th:object="${reviewRequest}"
            th:action="${editMode} ? @{/v1/customer/reviews/edit(id=*{reviewId})} : @{/v1/customer/reviews/create}">
        <input type="hidden" th:field="*{reviewId}" />
        <input type="hidden" th:field="*{carRentalId}" />
        <div class="card-body">
          <p class="text-muted">Đánh giá cho giao dịch thuê xe <strong th:text="${'#' + reviewRequest.carRentalId}">#0</strong></p>
          <div class="mb-3">
            <label class="form-label" for="reviewStar">Số sao</label>
            <select id="reviewStar" class="form-select" th:field="*{reviewStar}" th:classappend="${#fields.hasErrors('reviewStar')} ? 'is-invalid'" required>
              <option value="">-- Chọn mức đánh giá --</option>
              <option value="5">5 sao - Rất hài lòng</option>
              <option value="4">4 sao - Hài lòng</option>
              <option value="3">3 sao - Bình thường</option>
              <option value="2">2 sao - Chưa hài lòng</option>
              <option value="1">1 sao - Không hài lòng</option>
            </select>
            <div class="invalid-feedback" th:errors="*{reviewStar}"></div>
          </div>
          <div class="mb-3">
            <label class="form-label" for="comment">Nội dung đánh giá</label>
            <textarea id="comment" class="form-control" rows="6" maxlength="500" th:field="*{comment}" th:classappend="${#fields.hasErrors('comment')} ? 'is-invalid'" required></textarea>
            <div class="invalid-feedback" th:errors="*{comment}"></div>
            <div class="form-text">Tối đa 500 ký tự.</div>
          </div>
        </div>
        <div class="card-footer bg-white text-end">
          <a class="btn btn-outline-secondary" th:href="@{/v1/customer/reviews}">Hủy</a>
          <button class="btn btn-primary" type="submit">Lưu đánh giá</button>
        </div>
      </form>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
