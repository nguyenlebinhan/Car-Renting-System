<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Đánh giá của tôi | FU Car Renting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light" th:with="displayName=${account.accountName}">
    <th:block th:replace="~{components/customer-navbar :: customerNavbar(activePage='reviews', displayName=${displayName})}"></th:block>
    <main class="container-fluid px-4 py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
        <div>
          <h1 class="h3 mb-1">Đánh giá của tôi</h1>
          <p class="text-muted mb-0">Quản lý các đánh giá cho những chuyến thuê xe đã hoàn tất.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/v1/customer/rentals/history}">Chọn giao dịch để đánh giá</a>
      </div>

      <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>Mã</th>
                <th>Xe</th>
                <th>Thời gian thuê</th>
                <th>Số sao</th>
                <th>Nội dung</th>
                <th>Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="review : ${reviewPage.content}">
                <td th:text="${review.reviewId}">0</td>
                <td>
                  <strong th:text="${review.carName}">Tên xe</strong>
                  <div class="small text-muted" th:text="${'Giao dịch #' + review.carRentalId}"></div>
                </td>
                <td th:text="${#temporals.format(review.pickUpDate, 'dd/MM/yyyy') + ' - ' + #temporals.format(review.returnDate, 'dd/MM/yyyy')}"></td>
                <td><span class="text-warning" th:text="${#strings.repeat('★', review.reviewStar)}">★★★★★</span></td>
                <td class="text-break" style="min-width: 260px" th:text="${review.comment}"></td>
                <td class="text-nowrap">
                  <a class="btn btn-sm btn-outline-primary" th:href="@{/v1/customer/reviews/edit(id=${review.reviewId})}">Sửa</a>
                  <form class="d-inline" method="post" th:action="@{/v1/customer/reviews/delete(id=${review.reviewId})}" onsubmit="return confirm('Bạn có chắc muốn xóa đánh giá này?')">
                    <button class="btn btn-sm btn-outline-danger" type="submit">Xóa</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(reviewPage.content)}">
                <td colspan="6" class="text-center py-4">Bạn chưa có đánh giá nào.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <nav class="mt-3" th:if="${reviewPage.totalPages > 1}" aria-label="Phân trang đánh giá">
        <ul class="pagination">
          <li class="page-item" th:each="p : ${#numbers.sequence(0, reviewPage.totalPages - 1)}" th:classappend="${p == reviewPage.pageNumber} ? 'active'">
            <a class="page-link" th:href="@{/v1/customer/reviews(pageNumber=${p},pageSize=${reviewPage.pageSize})}" th:text="${p + 1}"></a>
          </li>
        </ul>
      </nav>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
