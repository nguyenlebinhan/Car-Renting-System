<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hệ Thống Có Lỗi Xảy Ra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" />
    <style>
      body {
        background-color: #f8fafc;
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
      }
      .error-card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        max-width: 550px;
      }
      .icon-bounce {
        animation: bounce 2s infinite;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center">
    <div class="card error-card p-4 p-sm-5 bg-white text-center m-3">
      <div class="text-warning display-1 mb-3 icon-bounce">
        <i class="bi bi-exclamation-octagon-fill"></i>
      </div>

      <h3 class="fw-bold text-dark mb-2">Đã xảy ra sự cố!</h3>
      <p class="text-muted small mb-4">
        Hệ thống FU Car Renting gặp phải một lỗi không mong muốn khi xử lý yêu cầu của bạn.
      </p>

      <div class="alert alert-danger-subtle border border-danger-subtle text-start rounded-3 p-3 mb-4">
        <div class="fw-bold text-danger mb-1 small">
          <i class="bi bi-bug me-1"></i>
          Chi tiết lỗi:
        </div>
        <span class="text-dark small font-monospace d-block text-break" th:text="${error}">
          Nội dung lỗi chi tiết sẽ được hiển thị tại đây...
        </span>
      </div>

      <div class="row g-2">
        <div class="col-sm-6 d-grid">
          <button onclick="window.location.reload();" class="btn btn-outline-secondary fw-bold">
            <i class="bi bi-arrow-clockwise me-1"></i>
            Thử tải lại trang
          </button>
        </div>
        <div class="col-sm-6 d-grid">
          <a th:href="@{/}" class="btn btn-primary fw-bold">
            <i class="bi bi-house-door me-1"></i>
            Quay về trang chủ
          </a>
        </div>
      </div>

      <hr class="text-muted my-4" />
      <small class="text-muted">Nếu lỗi này tiếp tục tiếp diễn, vui lòng liên hệ Đội ngũ Quản trị viên.</small>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
