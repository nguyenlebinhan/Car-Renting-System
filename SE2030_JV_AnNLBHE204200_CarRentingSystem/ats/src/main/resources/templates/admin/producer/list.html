<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lý hãng xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <th:block th:replace="~{components/admin-navbar :: adminNavbar(activePage='producer')}"></th:block>
    <main class="container-fluid px-4 py-4">
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
        <div>
          <h1 class="h3 mb-0">Quản lý hãng xe</h1>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-primary" th:href="@{/v1/admin/car/list}">Danh sách xe</a>
          <a class="btn btn-primary" th:href="@{/v1/admin/producer/create}">Thêm hãng xe</a>
        </div>
      </div>

      <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Tên hãng xe</th>
                <th>Địa chỉ</th>
                <th>Quốc gia</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="producer : ${producers}">
                <td th:text="${producer.producerId}">1</td>
                <td><strong th:text="${producer.producerName}">Tên hãng</strong></td>
                <td th:text="${producer.address}">Địa chỉ</td>
                <td th:text="${producer.country}">Quốc gia</td>
                <td class="text-nowrap text-end">
                  <a
                    class="btn btn-sm btn-outline-primary"
                    th:href="@{/v1/admin/producer/edit(id=${producer.producerId})}"
                  >
                    Sửa
                  </a>
                  <form
                    class="d-inline"
                    method="post"
                    th:action="@{/v1/admin/producer/delete(id=${producer.producerId})}"
                    onsubmit="return confirm('Xóa hãng xe này?');"
                  >
                    <button class="btn btn-sm btn-outline-danger" type="submit">Xóa</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(producers)}">
                <td colspan="5" class="text-center py-4">Chưa có hãng xe.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
