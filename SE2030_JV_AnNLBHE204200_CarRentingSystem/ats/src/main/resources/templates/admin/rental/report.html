<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Báo cáo giao dịch</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <th:block th:replace="~{components/admin-navbar :: adminNavbar(activePage='report')}"></th:block>
    <main class="container-fluid px-4 py-4">
      <div class="mb-3">
        <h1 class="h3">Báo cáo giao dịch theo thời gian</h1>
        <p class="text-muted">Kết quả được sắp xếp giảm dần theo giá trị giao dịch, sau đó theo ngày nhận xe.</p>
      </div>
      <form class="card card-body shadow-sm mb-3" method="get" th:action="@{/v1/admin/car-rental/report}">
        <div class="row g-3 align-items-end">
          <div class="col-md-5">
            <label class="form-label">Từ ngày</label>
            <input type="date" name="startDate" class="form-control" th:value="${startDate}" required />
          </div>
          <div class="col-md-5">
            <label class="form-label">Đến ngày</label>
            <input type="date" name="endDate" class="form-control" th:value="${endDate}" required />
          </div>
          <div class="col-md-2">
            <button class="btn btn-primary w-100">Xem báo cáo</button>
          </div>
        </div>
      </form>
      <div class="card shadow-sm" th:if="${carRentalReport!=null}">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-dark">
              <tr>
                <th>Mã</th>
                <th>Khách hàng</th>
                <th>Xe</th>
                <th>Nhận</th>
                <th>Trả</th>
                <th>Giá trị</th>
                <th>Trạng thái</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="r:${carRentalReport.content}">
                <td th:text="${r.carRentalId}"></td>
                <td th:text="${r.customerName}"></td>
                <td th:text="${r.carName+' · '+r.producerName}"></td>
                <td th:text="${#temporals.format(r.pickUpDate,'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(r.returnDate,'dd/MM/yyyy')}"></td>
                <td class="fw-bold" th:text="${#numbers.formatDecimal(r.rentPrice,0,'POINT',0,'COMMA')}+' VNĐ'"></td>
                <td th:text="${r.status}"></td>
              </tr>
              <tr th:if="${#lists.isEmpty(carRentalReport.content)}">
                <td colspan="7" class="text-center py-4">Không có giao dịch trong khoảng thời gian này.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <nav class="mt-3" th:if="${carRentalReport!=null and carRentalReport.totalPages>1}">
        <ul class="pagination">
          <li
            class="page-item"
            th:each="p:${#numbers.sequence(0,carRentalReport.getTotalPages()-1)}"
            th:classappend="${p==carRentalReport.pageNumber}?'active'"
          >
            <a
              class="page-link"
              th:href="@{/v1/admin/car-rental/report(startDate=${startDate},endDate=${endDate},pageNumber=${p},pageSize=${carRentalReport.pageSize})}"
              th:text="${p+1}"
            ></a>
          </li>
        </ul>
      </nav>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
