<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lý thuê xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <th:block th:replace="~{components/admin-navbar :: adminNavbar(activePage='rental')}"></th:block>
    <main class="container-fluid px-4 py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1 class="h3 mb-0">Quản lý giao dịch thuê xe</h1>
        </div>
        <a class="btn btn-info" th:href="@{/v1/admin/car-rental/report}">Báo cáo theo kỳ</a>
      </div>
      <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>Mã</th>
                <th>Khách hàng</th>
                <th>Xe</th>
                <th>Nhận xe</th>
                <th>Trả xe</th>
                <th>Thành tiền</th>
                <th>Trạng thái</th>
                <th>Thao tác hợp lệ</th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="r:${carRentalReport.content}">
                <td th:text="${r.carRentalId}"></td>
                <td th:text="${r.customerName}"></td>
                <td>
                  <strong th:text="${r.carName}"></strong>
                  <div class="small text-muted" th:text="${r.producerName}"></div>
                </td>
                <td th:text="${#temporals.format(r.pickUpDate,'dd/MM/yyyy')}"></td>
                <td th:text="${#temporals.format(r.returnDate,'dd/MM/yyyy')}"></td>
                <td th:text="${#numbers.formatDecimal(r.rentPrice,0,'POINT',0,'COMMA')}+' VNĐ'"></td>
                <td>
                  <span class="badge text-bg-secondary" th:text="${r.status}"></span>
                </td>
                <td class="text-nowrap">
                  <form
                    class="d-inline"
                    method="post"
                    th:if="${r.status=='PENDING'}"
                    th:action="@{/v1/admin/rental/status(id=${r.carRentalId})}"
                  >
                    <input type="hidden" name="status" value="CONFIRMED" />
                    <button class="btn btn-sm btn-success">Xác nhận</button>
                  </form>
                  <form
                    class="d-inline"
                    method="post"
                    th:if="${r.status=='PENDING' or r.status=='CONFIRMED'}"
                    th:action="@{/v1/admin/rental/status(id=${r.carRentalId})}"
                  >
                    <input type="hidden" name="status" value="CANCELLED" />
                    <button class="btn btn-sm btn-outline-danger">Hủy</button>
                  </form>
                  <form
                    class="d-inline"
                    method="post"
                    th:if="${r.status=='CONFIRMED' and r.pickUpDate.equals(today)}"
                    th:action="@{/v1/admin/rental/status(id=${r.carRentalId})}"
                  >
                    <input type="hidden" name="status" value="ACTIVE" />
                    <button class="btn btn-sm btn-primary">Bắt đầu</button>
                  </form>
                  <form
                    class="d-inline"
                    method="post"
                    th:if="${(r.status=='ACTIVE' and r.returnDate.equals(today)) or r.status=='OVERDUE'}"
                    th:action="@{/v1/admin/rental/status(id=${r.carRentalId})}"
                  >
                    <input type="hidden" name="status" value="COMPLETED" />
                    <button class="btn btn-sm btn-success">Hoàn tất</button>
                  </form>
                  <button
                    type="button"
                    class="btn btn-sm btn-warning"
                    data-bs-toggle="modal"
                    data-bs-target="#overdueModal"
                    th:if="${r.status=='ACTIVE' and today.isAfter(r.returnDate)}"
                    th:attr="data-rental-id=${r.carRentalId},data-return-date=${r.returnDate}"
                  >
                    Quá hạn
                  </button>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(carRentalReport.content)}">
                <td colspan="8" class="text-center py-4">Chưa có giao dịch.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <nav class="mt-3" th:if="${carRentalReport.totalPages>1}">
        <ul class="pagination">
          <li
            class="page-item"
            th:each="p:${#numbers.sequence(0,carRentalReport.getTotalPages()-1)}"
            th:classappend="${p==carRentalReport.pageNumber}?'active'"
          >
            <a
              class="page-link"
              th:href="@{/v1/admin/rental/list(pageNumber=${p},pageSize=${carRentalReport.pageSize})}"
              th:text="${p+1}"
            ></a>
          </li>
        </ul>
      </nav>
    </main>

    <div class="modal fade" id="overdueModal" tabindex="-1" aria-labelledby="overdueModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form method="post" th:action="@{/v1/admin/rental/status}">
            <div class="modal-header">
              <h2 class="modal-title fs-5" id="overdueModalLabel">Cập nhật xe trả quá hạn</h2>
              <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Đóng"></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="overdueRentalId" name="id" />
              <input type="hidden" name="status" value="OVERDUE" />
              <p>
                Ngày trả dự kiến:
                <strong id="plannedReturnDate"></strong>
              </p>
              <label class="form-label" for="actualReturnDate">Ngày trả thực tế</label>
              <input class="form-control" type="date" id="actualReturnDate" name="actualReturnDate" required />
              <div class="form-text">Ngày trả thực tế phải sau ngày trả dự kiến.</div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
              <button type="submit" class="btn btn-warning">Cập nhật quá hạn</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const overdueModal = document.getElementById("overdueModal");
      const overdueRentalId = document.getElementById("overdueRentalId");
      const plannedReturnDate = document.getElementById("plannedReturnDate");
      const actualReturnDate = document.getElementById("actualReturnDate");

      overdueModal.addEventListener("show.bs.modal", function (event) {
        const button = event.relatedTarget;
        const returnDate = button.getAttribute("data-return-date");
        const dateParts = returnDate.split("-").map(Number);
        const minimumReturnDate = new Date(Date.UTC(dateParts[0], dateParts[1] - 1, dateParts[2] + 1));

        overdueRentalId.value = button.getAttribute("data-rental-id");
        plannedReturnDate.textContent = returnDate;
        actualReturnDate.min = minimumReturnDate.toISOString().split("T")[0];
        actualReturnDate.value = "";
      });
    </script>
  </body>
</html>
