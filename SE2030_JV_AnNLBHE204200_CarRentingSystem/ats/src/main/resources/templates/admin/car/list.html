<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quản lý xe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  </head>
  <body class="bg-light">
    <th:block th:replace="~{components/admin-navbar :: adminNavbar(activePage='car')}"></th:block>
    <main class="container-fluid px-4 py-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
          <h1 class="h3 mb-0">Quản lý xe</h1>
        </div>
        <div class="d-flex gap-2">
          <a class="btn btn-outline-primary" th:href="@{/v1/admin/producer/list}">Quản lý hãng xe</a>
          <a class="btn btn-primary" th:href="@{/v1/admin/car/create}">Thêm xe</a>
        </div>
      </div>
      <div class="alert alert-success" th:if="${success}" th:text="${success}"></div>
      <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
      <div class="card shadow-sm">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>ID</th>
                <th>Xe</th>
                <th>Năm</th>
                <th>Màu</th>
                <th>Chỗ</th>
                <th>Ngày nhập</th>
                <th>Giá/ngày</th>
                <th>Trạng thái</th>
                <th>Hãng</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr th:each="car : ${carResponse.content}">
                <td th:text="${car.carId}"></td>
                <td>
                  <strong th:text="${car.carName}"></strong>
                  <div class="small text-muted" th:text="${car.description}"></div>
                </td>
                <td th:text="${car.carModelYear}"></td>
                <td th:text="${car.color}"></td>
                <td th:text="${car.capacity}"></td>
                <td th:text="${#temporals.format(car.importDate,'dd/MM/yyyy')}"></td>
                <td th:text="${#numbers.formatDecimal(car.rentPrice,0,'POINT',0,'COMMA')} + ' VNĐ'"></td>
                <td>
                  <span class="badge text-bg-secondary" th:text="${car.status}"></span>
                </td>
                <td th:text="${car.carProducerName}"></td>
                <td class="text-nowrap">
                  <a class="btn btn-sm btn-outline-primary" th:href="@{/v1/admin/car/edit(id=${car.carId})}">Sửa</a>
                  <form
                    class="d-inline"
                    th:action="@{/v1/admin/car/delete(id=${car.carId})}"
                    method="post"
                    onsubmit="return confirm('Xóa xe này? Xe có giao dịch sẽ được chuyển sang INACTIVE.');"
                  >
                    <button class="btn btn-sm btn-outline-danger">Xóa</button>
                  </form>
                </td>
              </tr>
              <tr th:if="${#lists.isEmpty(carResponse.content)}">
                <td colspan="10" class="text-center py-4">Chưa có xe.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <nav class="mt-3" th:if="${carResponse.totalPages > 1}">
        <ul class="pagination">
          <li
            class="page-item"
            th:each="p:${#numbers.sequence(0,carResponse.totalPages-1)}"
            th:classappend="${p==carResponse.pageNumber}?'active'"
          >
            <a
              class="page-link"
              th:href="@{/v1/admin/car/list(pageNumber=${p},pageSize=${carResponse.pageSize})}"
              th:text="${p+1}"
            ></a>
          </li>
        </ul>
      </nav>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
